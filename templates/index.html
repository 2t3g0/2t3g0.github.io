<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Comments Extractor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black
            font-family: "Noto Sans KR", sans-serif;
            line-height: normal;
            word-break: keep-all;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            touch-action: manipulation;
        }
        img {
            overflow-clip-margin: content-box;
            overflow: clip;
        }
        button{
            margin: 0px;
            padding: 0px;
            border: 0px;
            font: inherit;
            vertical-align: top;
            background-color: transparent;
        }

        .style_header{
            width: 100%;
            background-color: black;
            border-bottom: 0.1rem solid rgb(35,35,35);
            height: 6.5rem;
            position: sticky;
            top: 0px;
            z-index: 6;
            color: white;
        }
        .style_nav{
            max-width: 120rem;
            height: 100%;
            display: flex;
            -webkit-box-align: center;
            align-items: center;
            margin: 0px auto;
            padding: 0px 0.8rem;
        }
        .style_logo_wrapper{
            padding: 0rem 0.8rem;
            margin-right: 0rem;
        }
        .style_logo{
            display: inline-block;
        }
        .style_main_section{
            min-height: 70rem;
            padding: 0rem 2rem;
            box-sizing: border-box;
            background: radial-gradient(rgb(35, 35, 36), rgb(0, 0, 0));
            display: flex;
            -webkit-box-pack: center;
            justify-content: center;
            -webkit-box-align: center;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .style_main{
            background:radial-gradient(
                rgb(35,35,35), rgb(0,0,0));
        }
        .style_main_section_h1{
            margin-bottom: 5rem;
            padding: 0rem;
            color: rgb(255, 255, 255);
            font-weight: 300;
            font-size: 4.2rem;
            line-height: 1.2;

        }
        .style_main_section_h2{
            padding: 0rem;
            margin-bottom: 4rem;
            background: linear-gradient(45deg, rgb(0, 198, 133), rgb(81, 169, 243)) text;
            -webkit-text-fill-color: transparent;
            font-weight: 400;
            font-size: 1.7rem;
        }

        .style_main_section_title{
            font-weight: 600;
        }
        .style_wrap_search{
            display: flex;
            justify-content: content;

            padding: 0rem 2rem;
            margin-bottom: 2rem;
            box-sizing: border-box;
            align-items: center;
        }
        .style_search{
            display: flex;

            width: 62.4rem;
            height: 5.4rem;
            font-size: 1.4rem;
            background-color: rgb(255,255,255);
            border-radius: 0.6rem;
        }
        .style_search_button{
            width: 5rem;
            top: 0px;
            bottom: 0px;
            cursor: not-allowed;
            right: 0px;

        }
        .style_button_img{
            width: 1.6rem;
            vertical-align: -0.125rem;
        }
        .style_container_serach{
            width: 100%;
            padding: 0rem;
            margin-bottom: 2rem;
            box-sizing: border-box;
            display: flex;
            -webkit-box-pack: center;
            justify-content: center;
        }
        .style_main_input{
            width: calc(100% - 15rem);
            height: 100%;
            top: 0px;
            left: 10rem;
            bottom: 0px;
            padding: 0.5rem 0px;
            box-sizing: border-box;
            background-color: transparent;
            font-size: 1.4rem;
            color: rgb(35, 35, 36);
            border: none;
            font-family: Helvetica;
            font-weight: 500;
        }
        .style_footer{
            background-color: rgb(0,0,0);
        }
        .style_footer_container{
            box-sizing: border-box;
            max-width: 120rem;
            width: 100%;
            display: flex;
            flex: 1 0 auto;
            flex-direction: column;
            border-radius: 0px;
            margin: 0px auto;
            padding: 0px;
        }
        .style_footer_content{
            width: 100%;
            padding: 1.5rem 2rem 6rem;
            box-sizing: border-box;
            font-size: 1.1rem;
            font-weight: 300;
            color: rgb(174, 174, 176);
            line-height: 1.8;
            display: flex;
            -webkit-box-pack: justify;
            justify-content: space-between;
        }
        .style_NavList{
            height: 100%;
            list-style: none;
            margin: 0px;
            padding: 0px;
            display: flex;
            -webkit-box-align: center;
            align-items: center;    
        }
        
        

        
    
    </style>
</head>
<body>
    <div id="root">
        <header class="style_header">
            <nav class="style_nav">
                <div class ="style_logo_wrapper">
                    <div class="style_logo">
                        <a class="style_logo_content">
                            <img src="{{ url_for('static', filename='logo.png') }}" alt="로고" width="166.79">
                        </a>
                    </div>
                </div>
                
            </nav>
        </header>

        <main class="style_main">
            <section class="style_main_section">
                <div>
                    <h1 class="style_main_section_h1">
                        유튜브 댓글 추출을 위한
                        <br>
                        가장 쉽고 강력한 
                        데이터 추출 툴,
                        <span class="style_main_section_title">YouExtra</span>
                    </h1>
                    <h2 class="style_main_section_h2">
                        유튜브 댓글 추출을 통해 원하는 인사이트를 도출하고, 비즈니스를 확장시켜보세요.
                    </h2>
                    <form method="post">
                        <div class="style_container_serach">
                            <div class="style_wrap_search">
                                <div class="style_search">
                                    <button class="style_search_button">
                                        <img class="style_button_img" src="{{ url_for('static', filename='search.png') }}" alt="검색">
                                    </button>
                                    <input class="style_main_input" type="text" placeholder="유튜브 링크를 입력하세요" id="video_url" name="video_url" required>
                                    <div></div>
                                </div>
                            </div>
                        </div>
                    </form>
                    <div></div>
                </div>
            </section>
        </main>

        <footer class="style_footer">
            <div class="style_footer_container">
                <div class="style_footer_content">
                    <div>
                        YouExtra(주) &nbsp;|&nbsp; 부산광역시 부산진구 복지로 70(개금동, 개금아이파크)
                        <br>
                        대표: 이태경 &nbsp;|&nbsp; email: maple326@naver.com
                        <br>
                        Copyright
                        2024
                        . youextra Inc. All Rights Reserved.
                    </div>
                </div>
            </div>
        </footer>
    </div>
    
</body>
</html>
